# This is a Databricks asset bundle definition for bakehouse_analytics.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: bakehouse_analytics
  uuid: ee00e8d3-fc54-4fa1-8888-3c4426fc17d1

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-da407ca1-a4f4.cloud.databricks.com
    variables:
      catalog: bakehouse_analytics_dev
      schema: rnd
  prod:
    mode: production
    workspace:
      host: https://dbc-da407ca1-a4f4.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/998877665544332211ehv@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/998877665544332211ehv@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: bakehouse_analytics_dev
      schema: rnd
    permissions:
      - user_name: 998877665544332211ehv@gmail.com
        level: CAN_MANAGE
